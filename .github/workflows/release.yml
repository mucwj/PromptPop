name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Create or update draft release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          title="PromptPop ${version}"
          body="$(cat <<'NOTES'
          First public PromptPop release.

          Installers:
          - Windows x64: use the NSIS `.exe` installer.
          - macOS Apple Silicon: use the arm64 `.dmg`.
          - macOS Intel: use the x64 `.dmg`.

          Notes:
          - macOS artifacts are ad-hoc signed and not notarized yet.
          - Windows artifacts are not code-signed yet.
          - PromptPop stores prompts and settings locally by default.
          NOTES
          )"

          if gh release view "${tag}" >/dev/null 2>&1; then
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.id')"
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="${title}" \
              -f body="${body}" \
              -F draft=true \
              -F prerelease=false >/dev/null
          else
            gh release create "${tag}" \
              --draft \
              --title "${title}" \
              --notes "${body}" >/dev/null
            release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.id')"
          fi

          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

  build-installers:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 installer
            platform: windows-latest
            args: --bundles nsis
          - name: macOS Apple Silicon DMG
            platform: macos-latest
            args: --bundles dmg
          - name: macOS Intel DMG
            platform: macos-15-intel
            args: --bundles dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and upload installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs:
      - create-release
      - build-installers
    runs-on: ubuntu-latest

    steps:
      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: |
          set -euo pipefail
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false \
            -F prerelease=false >/dev/null
