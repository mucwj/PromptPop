name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend and Rust tests
        run: npm run verify

      - name: Build macOS app bundle
        run: npm run tauri:build:app
